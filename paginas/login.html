<body>

    <header class="cabecalho">
        <button class="menuhamburguer" aria-label="abre e fecha o menu de opções" onclick="clicado()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <h1 class="logo"><span class="l1">Raízes do</span> <span class="l2">Nordeste</span></h1>

        <a href="login.html" id="iconelogin">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </a>

        <nav class="menudecima" aria-label="menu principal">
            <ul class="listadecima">
                <li class="itemdecima"><a href="../index.html">Início</a></li>
                <li class="itemdecima"><a href="cardapio.html">Cardápio</a></li>
                <li class="itemdecima"><a href="carrinho.html">Carrinho</a></li>

                <li class="itemdecima"><a href="conta.html">Conta</a></li>
            </ul>
        </nav>
    </header>
    <!--Fim do cabecalho-->

    <!--Inicio do conteudo principal-->
    <main>
        <div class="caixalogin">
            <div class="abas">
                <button id="abaentrar" class="active">Entrar</button>
                <button id="abacadastrar">Criar conta</button>
            </div>

            <form id="painellogin" class="painelform active">
                <label for="usuariologin" class="sr-only">Nome de usuário</label>
                <input type="text" id="usuariologin" placeholder="Nome de usuário" required>
                <label for="senhalogin" class="sr-only">Senha</label>
                <input type="password" id="senhalogin" placeholder="Senha" required>
                <p class="msgerro" id="errologin"></p>
                <button type="submit">Entrar</button>
            </form>

            <form id="painelcadastro" class="painelform">
                <label for="usuariocadastro" class="sr-only">Nome de usuário</label>
                <input type="text" id="usuariocadastro" placeholder="Escolha um nome de usuário" required>
                <label for="senhacadastro" class="sr-only">Senha</label>
                <input type="password" id="senhacadastro" placeholder="Crie uma senha" required>
                <label for="senhacadastro2" class="sr-only">Confirme a senha</label>
                <input type="password" id="senhacadastro2" placeholder="Confirme a senha" required>
                <p class="msgerro" id="errocadastro"></p>
                <button type="submit">Criar conta</button>
            </form>
        </div>

        <!--Inicio sessao termos-->
        <section class="sessoes termos">
            <p>
                Ao utilizar este site, você concorda com nossos 
                <a href="termos.html">Termos de Uso</a> e 
                <a href="privacidade.html">Política de Privacidade</a>.
            </p>
            <p>&copy;<span id="ano"></span> Raízes do Nordeste LTDA</p>
        </section>
        <!--Fim sessao termos-->
    </main>
    <!--Fim do conteudo principal-->
